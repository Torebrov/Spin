<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Правильная мотивация</title>
    <style>
        :root {
            --reel-width: 120px;
            --item-height: 80px;
            --visible-items: 1;
        }

        body {
            background-color: #1a1a2e;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 { margin-bottom: 20px; color: #00d2ff; }

        /* Контейнер для всех барабанов */
        .slot-machine {
            display: flex;
            gap: 10px;
            padding: 20px;
            background: #16213e;
            border: 4px solid #0f3460;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
            overflow: hidden;
            position: relative;
        }

        /* Золотая рамка по центру */
        .slot-machine::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: var(--item-height);
            transform: translateY(-50%);
            border: 3px solid #f1c40f;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.5);
            pointer-events: none;
            z-index: 10;
        }

        /* Один барабан */
        .reel {
            width: var(--reel-width);
            height: calc(var(--item-height) * var(--visible-items));
            background: #0f3460;
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }

        /* Лента со словами внутри барабана */
        .reel-container {
            display: flex;
            flex-direction: column;
            transition: transform 0.5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
            will-change: transform;
        }

        .slot-item {
            height: var(--item-height);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            padding: 0 5px;
            border-bottom: 1px solid #1a1a2e;
            box-sizing: border-box;
        }

        button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }

        button:hover { background: #ff4d6d; transform: scale(1.05); }
        button:disabled { background: #555; cursor: not-allowed; }

        .result-text {
            margin-top: 20px;
            font-size: 1.5rem;
            min-height: 1.6em;
            color: #f1c40f;
        }
    </style>
</head>
<body>

    <h1>Генератор универсальных фраз Ивана</h1>

    <div class="slot-machine" id="machine">
        </div>

    <div class="result-text" id="finalResult">Нажми чтобы замотивировать летчика</div>

    <button id="spinBtn">Вперёд! 🎰</button>

    <script>
        // ВАША ТАБЛИЦА (5 столбцов)
        const data = [
            ["Че сказал блять?", "Лети уже,", "Ну тупоооой...,", "ты со стрелками дружишь?", "Не душни!"],
            ["тройник,", "нубяра,", "косяпор,", "лошара,", "ПАПУАС,"],
            ["да ты задолюбал", "че со скоростью?", "нихерасе", "блять, да ты заебал", "дебил блять"],
            ["двойник,", "ас,", "пупупу,", "ёк макарёк,", "ёмаёёё,"],
            ["эх, мороз, мороз", "глухой чтоль?", "разрешил уже", "летать не умеет", "че ругаешься?"]
        ];

        const machine = document.getElementById('machine');
        const spinBtn = document.getElementById('spinBtn');
        const resultText = document.getElementById('finalResult');
        
        const itemHeight = 80; // Должно совпадать с CSS
        const reelsCount = 5;
        let reelElements = [];

        // Инициализация барабанов
        function init() {
            for (let i = 0; i < reelsCount; i++) {
                const reel = document.createElement('div');
                reel.className = 'reel';
                
                const container = document.createElement('div');
                container.className = 'reel-container';
                
                // Заполняем барабан словами (дублируем для эффекта бесконечности)
                const list = [...data[i], ...data[i], ...data[i]]; 
                list.forEach(text => {
                    const item = document.createElement('div');
                    item.className = 'slot-item';
                    item.textContent = text;
                    container.appendChild(item);
                });

                reel.appendChild(container);
                machine.appendChild(reel);
                reelElements.push(container);
            }
        }

        async function spin() {
            spinBtn.disabled = true;
            resultText.textContent = "Вращаем...";
            
            const results = [];

            const spinPromises = reelElements.map((container, i) => {
                return new Promise(resolve => {
                    // Выбираем случайный индекс из оригинального списка
                    const randomIndex = Math.floor(Math.random() * data[i].length);
                    results.push(data[i][randomIndex]);

                    // Рассчитываем смещение (учитываем вторую копию списка для надежности анимации)
                    const targetY = (randomIndex + data[i].length) * itemHeight;
                    
                    // Добавляем случайную задержку и длительность для каждого барабана
                    const duration = 2 + i * 0.5; 
                    container.style.transition = `transform ${duration}s cubic-bezier(0.25, 0.1, 0.25, 1)`;
                    container.style.transform = `translateY(-${targetY}px)`;

                    setTimeout(resolve, duration * 1000);
                });
            });

            await Promise.all(spinPromises);
            
            resultText.textContent = results.join(" ");
            spinBtn.disabled = false;

            // Сброс позиции без анимации для следующего раза (необязательно, но полезно)
            reelElements.forEach((container, i) => {
                const currentIndex = data[i].indexOf(results[i]);
                container.style.transition = 'none';
                container.style.transform = `translateY(-${currentIndex * itemHeight}px)`;
            });
        }

        spinBtn.addEventListener('click', spin);
        init();
    </script>
</body>
</html>
