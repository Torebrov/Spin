
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Phrase Slot</title>
    <style>
        :root {
            --reel-width: 130px;
            --item-height: 90px;
            --bg-color: #0b0e14;
            --accent-color: #00d2ff;
            --gold-color: #f1c40f;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .slot-machine {
            display: flex;
            gap: 12px;
            padding: 25px;
            background: #16213e;
            border: 4px solid #1f4068;
            border-radius: 20px;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        /* Золотая рамка фокуса */
        .slot-machine::after {
            content: "";
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: var(--item-height);
            transform: translateY(-50%);
            border: 3px solid var(--gold-color);
            background: rgba(241, 196, 15, 0.05);
            pointer-events: none;
            z-index: 10;
        }

        .reel {
            width: var(--reel-width);
            height: var(--item-height);
            background: #0b0e14;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .reel-container {
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        .slot-item {
            height: var(--item-height);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            padding: 0 10px;
            box-sizing: border-box;
            /* Скрываем текст по умолчанию */
            color: rgba(255, 255, 255, 0); 
            text-shadow: none;
            transition: color 0.4s ease, text-shadow 0.4s ease;
        }

        /* Состояние заглушки (знак вопроса) */
        .slot-item.hidden-state::before {
            content: "?";
            color: #2a3a5a;
            font-size: 24px;
        }

        /* Когда барабан остановился — проявляем текст */
        .slot-item.reveal {
            color: var(--gold-color);
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }
        .slot-item.reveal::before {
            content: none;
        }

        button {
            margin-top: 40px;
            padding: 15px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(45deg, #e94560, #ff4d6d);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(233, 69, 96, 0.3);
            transition: 0.2s;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(233, 69, 96, 0.4); }
        button:active { transform: translateY(1px); }
        button:disabled { background: #444; cursor: not-allowed; box-shadow: none; }

        .result-phrase {
            margin-top: 30px;
            font-size: 1.8rem;
            color: #fff;
            min-height: 1.2em;
            text-align: center;
            max-width: 80%;
        }
    </style>
</head>
<body>

    <div class="slot-machine" id="machine"></div>

    <div class="result-phrase" id="resultLabel">Нажми, чтобы узнать что думает Иван</div>

    <button id="spinBtn">ЗАПУСК 🎰</button>

    <script>
        const data = [
            ["Че сказал блять?", "Лети уже,", "Ну тупоооой...,", "ты со стрелками дружишь?", "Не душни!"],
            ["тройник,", "нубяра,", "косяпор,", "лошара,", "ПАПУАС,"],
            ["да ты задолюбал", "че со скоростью?", "нихерасе", "блять, да ты заебал", "дебил блять"],
            ["двойник,", "ас,", "пупупу,", "ёк макарёк,", "ёмаёёё,"],
            ["эх, мороз, мороз", "глухой чтоль?", "разрешил уже", "летать не умеет", "че ругаешься?"]
        ];

        const machine = document.getElementById('machine');
        const spinBtn = document.getElementById('spinBtn');
        const resultLabel = document.getElementById('resultLabel');
        
        const itemHeight = 90; 
        const reelsCount = 5;
        let reelContainers = [];

        function init() {
            machine.innerHTML = '';
            reelContainers = [];

            for (let i = 0; i < reelsCount; i++) {
                const reel = document.createElement('div');
                reel.className = 'reel';
                
                const container = document.createElement('div');
                container.className = 'reel-container';
                
                // 1. Первая ячейка — пустая со знаком вопроса (заглушка)
                const blank = document.createElement('div');
                blank.className = 'slot-item hidden-state';
                container.appendChild(blank);

                // 2. Добавляем реальные фразы (несколько циклов для длины прокрутки)
                const spinData = [...data[i], ...data[i], ...data[i]];
                spinData.forEach(text => {
                    const item = document.createElement('div');
                    item.className = 'slot-item';
                    item.textContent = text;
                    container.appendChild(item);
                });

                reel.appendChild(container);
                machine.appendChild(reel);
                reelContainers.push(container);
            }
        }

        async function spin() {
            spinBtn.disabled = true;
            resultLabel.style.opacity = "0.3";
            resultLabel.textContent = "Барабаны крутятся...";

            // Скрываем все предыдущие результаты перед новым броском
            document.querySelectorAll('.slot-item').forEach(el => el.classList.remove('reveal'));

            const finalWords = [];

            const promises = reelContainers.map((container, i) => {
                return new Promise(resolve => {
                    const randomIndex = Math.floor(Math.random() * data[i].length);
                    const chosenWord = data[i][randomIndex];
                    finalWords.push(chosenWord);

                    // Рассчитываем позицию (прокручиваем ко второму набору данных)
                    const targetIndex = randomIndex + data[i].length + 1;
                    const targetY = targetIndex * itemHeight;
                    
                    const duration = 2 + (i * 0.6); // Каждый следующий барабан крутится дольше
                    
                    container.style.transition = `transform ${duration}s cubic-bezier(0.15, 0, 0.15, 1)`;
                    container.style.transform = `translateY(-${targetY}px)`;

                    // Когда конкретный барабан остановился
                    setTimeout(() => {
                        // Находим именно ту ячейку, на которой остановились, и проявляем её
                        const items = container.querySelectorAll('.slot-item');
                        items[targetIndex].classList.add('reveal');
                        resolve();
                    }, duration * 1000);
                });
            });

            await Promise.all(promises);
            
            resultLabel.style.opacity = "1";
            resultLabel.textContent = finalWords.join(" ");
            spinBtn.disabled = false;
        }

        spinBtn.addEventListener('click', spin);
        init();
    </script>
</body>
</html>
